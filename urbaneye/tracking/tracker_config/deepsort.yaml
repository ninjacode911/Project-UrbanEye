# DeepSORT Hyperparameters
tracker_type: deepsort
max_age: 70               # Frames before track deletion (longer than ByteTrack)
n_init: 3                 # Detections before track confirmation
max_cosine_distance: 0.3  # Re-ID cosine distance threshold
nn_budget: 100            # Max gallery size per track (appearance memory)
embedder: mobilenet       # Re-ID model: mobilenet (MobileNetV2, 128-dim)
